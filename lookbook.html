<script>
  document.addEventListener("DOMContentLoaded", () => {
    const yearElement =
      document.getElementById("year");

    if (yearElement) {
      yearElement.textContent =
        new Date().getFullYear();
    }

    /* =====================================
       MAIN DRAWER + SHOP SUBMENU
    ===================================== */

    const mainDrawerDetails =
      document.getElementById(
        "Details-menu-drawer-container"
      );

    const mainMenuSummary =
      mainDrawerDetails?.querySelector(
        ":scope > summary"
      );

    const shopToggle =
      document.getElementById(
        "shop-menu-toggle"
      );

    const shopSubmenu =
      document.getElementById(
        "shop-menu-submenu"
      );

    const setShopMenuState = (isOpen) => {
      if (!shopToggle || !shopSubmenu) {
        return;
      }

      shopToggle.setAttribute(
        "aria-expanded",
        String(isOpen)
      );

      shopSubmenu.setAttribute(
        "aria-hidden",
        String(!isOpen)
      );

      shopSubmenu.classList.toggle(
        "is-open",
        isOpen
      );
    };

    const syncMainDrawerState = () => {
      const isOpen =
        Boolean(mainDrawerDetails?.open);

      document.documentElement.classList.toggle(
        "no-scroll",
        isOpen
      );

      document.body.classList.toggle(
        "no-scroll",
        isOpen
      );

      if (mainMenuSummary) {
        mainMenuSummary.setAttribute(
          "aria-label",
          isOpen
            ? "Close menu"
            : "Open menu"
        );
      }

      if (!isOpen) {
        setShopMenuState(false);
      }
    };

    shopToggle?.addEventListener(
      "click",
      (event) => {
        event.preventDefault();
        event.stopPropagation();

        const isCurrentlyOpen =
          shopToggle.getAttribute(
            "aria-expanded"
          ) === "true";

        setShopMenuState(
          !isCurrentlyOpen
        );
      }
    );

    mainDrawerDetails?.addEventListener(
      "toggle",
      syncMainDrawerState
    );

    syncMainDrawerState();

    /* =====================================
       LOOKBOOK
    ===================================== */

    const isTouchDevice =
      window.matchMedia(
        "(hover: none), (pointer: coarse)"
      ).matches;

    const items =
      document.querySelectorAll(
        ".lookbook-item"
      );

    const lightbox =
      document.getElementById(
        "lookbookLightbox"
      );

    const lightboxImageOne =
      document.getElementById(
        "lightboxImageOne"
      );

    const lightboxImageTwo =
      document.getElementById(
        "lightboxImageTwo"
      );

    const lightboxClose =
      document.getElementById(
        "lightboxClose"
      );

    let lightboxPreviouslyFocused = null;

    function encodeAssetPath(path) {
      if (!path) return "";

      return encodeURI(
        path.trim()
      );
    }

    function clearRevealed(
      exceptItem = null
    ) {
      document
        .querySelectorAll(
          ".lookbook-item.is-revealed"
        )
        .forEach((item) => {
          if (item !== exceptItem) {
            item.classList.remove(
              "is-revealed"
            );
          }
        });
    }

    function prepareImage(
      image,
      path,
      fallbackAlt = "",
      hideWhenMissing = false
    ) {
      if (!image) return;

      const encodedPath =
        encodeAssetPath(path);

      if (!encodedPath) {
        image.removeAttribute("src");
        image.alt = "";

        if (hideWhenMissing) {
          image.classList.add("is-empty");
          image.style.display = "none";
        }

        return;
      }

      image.alt =
        fallbackAlt ||
        image.alt ||
        "";

      image.onerror = () => {
        console.warn(
          "Failed to load image:",
          path
        );

        if (hideWhenMissing) {
          image.classList.add("is-empty");
          image.style.display = "none";
        }
      };

      image.onload = () => {
        image.classList.remove("is-empty");
        image.style.display = "block";
      };

      image.src = encodedPath;
    }

    function openLightbox(
      srcOne,
      srcTwo,
      altOne =
        "Expanded lookbook image one",
      altTwo =
        "Expanded lookbook image two"
    ) {
      if (
        !lightbox ||
        !lightboxImageOne ||
        !lightboxImageTwo
      ) {
        return;
      }

      const encodedOne =
        encodeAssetPath(srcOne);

      const encodedTwo =
        encodeAssetPath(srcTwo);

      if (!encodedOne) return;

      lightboxPreviouslyFocused =
        document.activeElement;

      lightboxImageOne.classList.remove(
        "is-hidden"
      );

      lightboxImageOne.style.display =
        "block";

      lightboxImageOne.alt = altOne;
      lightboxImageOne.src = encodedOne;

      if (encodedTwo) {
        lightboxImageTwo.classList.remove(
          "is-hidden"
        );

        lightboxImageTwo.style.display =
          "block";

        lightboxImageTwo.alt = altTwo;
        lightboxImageTwo.src = encodedTwo;
      } else {
        lightboxImageTwo.removeAttribute(
          "src"
        );

        lightboxImageTwo.alt = "";

        lightboxImageTwo.classList.add(
          "is-hidden"
        );

        lightboxImageTwo.style.display =
          "none";
      }

      lightbox.classList.add("is-open");

      lightbox.setAttribute(
        "aria-hidden",
        "false"
      );

      lightbox.scrollTop = 0;

      document.documentElement.classList.add(
        "no-scroll"
      );

      document.body.classList.add(
        "no-scroll"
      );

      lightboxClose?.focus();
    }

    function closeLightbox() {
      if (
        !lightbox ||
        !lightboxImageOne ||
        !lightboxImageTwo
      ) {
        return;
      }

      lightbox.classList.remove("is-open");

      lightbox.setAttribute(
        "aria-hidden",
        "true"
      );

      lightboxImageOne.removeAttribute(
        "src"
      );

      lightboxImageOne.alt = "";

      lightboxImageOne.classList.remove(
        "is-hidden"
      );

      lightboxImageTwo.removeAttribute(
        "src"
      );

      lightboxImageTwo.alt = "";

      lightboxImageTwo.classList.add(
        "is-hidden"
      );

      lightboxImageTwo.style.display =
        "none";

      if (!mainDrawerDetails?.open) {
        document.documentElement.classList.remove(
          "no-scroll"
        );

        document.body.classList.remove(
          "no-scroll"
        );
      }

      if (
        lightboxPreviouslyFocused &&
        typeof lightboxPreviouslyFocused.focus ===
          "function"
      ) {
        lightboxPreviouslyFocused.focus();
      }
    }

    items.forEach((item) => {
      const portraitPrimary =
        item.dataset.portraitPrimary || "";

      const portraitSecondary =
        item.dataset.portraitSecondary || "";

      const lightboxOne =
        item.dataset.lightboxOne || "";

      const lightboxTwo =
        item.dataset.lightboxTwo || "";

      const primaryImage =
        item.querySelector(
          ".img-primary"
        );

      const secondaryImage =
        item.querySelector(
          ".img-secondary"
        );

      const hasSwap =
        Boolean(
          portraitSecondary.trim()
        );

      prepareImage(
        primaryImage,
        portraitPrimary,
        primaryImage?.getAttribute("alt") ||
          "Lookbook primary image",
        false
      );

      if (hasSwap) {
        item.classList.add("has-swap");

        prepareImage(
          secondaryImage,
          portraitSecondary,
          secondaryImage?.getAttribute(
            "alt"
          ) ||
            "Lookbook alternate image",
          true
        );
      } else if (secondaryImage) {
        item.classList.remove("has-swap");

        secondaryImage.removeAttribute(
          "src"
        );

        secondaryImage.alt = "";

        secondaryImage.classList.add(
          "is-empty"
        );

        secondaryImage.style.display =
          "none";
      }

      if (!isTouchDevice) {
        item.addEventListener(
          "dblclick",
          (event) => {
            event.preventDefault();

            openLightbox(
              lightboxOne,
              lightboxTwo,
              primaryImage?.alt ||
                "Expanded lookbook image one",
              secondaryImage?.alt ||
                "Expanded lookbook image two"
            );
          }
        );
      }

      item.addEventListener(
        "click",
        (event) => {
          if (!isTouchDevice) {
            return;
          }

          event.preventDefault();

          if (
            hasSwap &&
            !item.classList.contains(
              "is-revealed"
            )
          ) {
            clearRevealed(item);

            item.classList.add(
              "is-revealed"
            );

            return;
          }

          openLightbox(
            lightboxOne,
            lightboxTwo,
            primaryImage?.alt ||
              "Expanded lookbook image one",
            secondaryImage?.alt ||
              "Expanded lookbook image two"
          );
        }
      );
    });

    lightboxImageTwo?.addEventListener(
      "error",
      () => {
        console.warn(
          "Failed to load lightbox image two:",
          lightboxImageTwo.src
        );

        lightboxImageTwo.classList.add(
          "is-hidden"
        );

        lightboxImageTwo.style.display =
          "none";
      }
    );

    lightboxImageTwo?.addEventListener(
      "load",
      () => {
        lightboxImageTwo.classList.remove(
          "is-hidden"
        );

        lightboxImageTwo.style.display =
          "block";
      }
    );

    lightboxClose?.addEventListener(
      "click",
      closeLightbox
    );

    lightbox?.addEventListener(
      "click",
      (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      }
    );

    document.addEventListener(
      "click",
      (event) => {
        if (
          isTouchDevice &&
          !event.target.closest(
            ".lookbook-item"
          ) &&
          !event.target.closest(
            ".lookbook-lightbox"
          )
        ) {
          clearRevealed();
        }
      }
    );

    /* =====================================
       COORDINATED ESCAPE BEHAVIOR
    ===================================== */

    document.addEventListener(
      "keydown",
      (event) => {
        if (event.key !== "Escape") {
          return;
        }

        if (
          lightbox?.classList.contains(
            "is-open"
          )
        ) {
          event.preventDefault();
          closeLightbox();
          return;
        }

        if (
          shopToggle?.getAttribute(
            "aria-expanded"
          ) === "true"
        ) {
          event.preventDefault();

          setShopMenuState(false);
          shopToggle.focus();
          return;
        }

        if (mainDrawerDetails?.open) {
          event.preventDefault();

          mainDrawerDetails.open = false;
          syncMainDrawerState();
          mainMenuSummary?.focus();
        }
      }
    );
  });
</script>
